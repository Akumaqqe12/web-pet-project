<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafaka AI Assistant</title>
    
    <!-- Подключаем библиотеки для форматирования -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 20px 0;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            border-radius: 20px 20px 0 0;
            flex-shrink: 0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4CAF50;
            flex-shrink: 0;
        }

        .status-bar.offline {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #F44336;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .chat-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 10px;
        }

        .msg {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-items: flex-end;
        }

        .msg.bot {
            align-items: flex-start;
        }

        .msg-content {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .msg.user .msg-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .msg.bot .msg-content {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .msg.bot .msg-content h1,
        .msg.bot .msg-content h2,
        .msg.bot .msg-content h3 {
            color: #667eea;
            margin: 15px 0 10px 0;
            font-weight: 600;
        }

        .msg.bot .msg-content h1 { font-size: 1.5em; }
        .msg.bot .msg-content h2 { font-size: 1.3em; }
        .msg.bot .msg-content h3 { font-size: 1.1em; }

        .msg.bot .msg-content p {
            margin: 8px 0;
        }

        .msg.bot .msg-content ul,
        .msg.bot .msg-content ol {
            margin: 10px 0;
            padding-left: 25px;
        }

        .msg.bot .msg-content li {
            margin: 5px 0;
        }

        .msg.bot .msg-content code {
            background: rgba(102, 126, 234, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9em;
            color: #a8b8ff;
        }

        .msg.bot .msg-content pre {
            background: #1a1a2e;
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            overflow-x: auto;
        }

        .msg.bot .msg-content pre code {
            background: none;
            padding: 0;
            color: #e0e0e0;
            font-size: 0.85em;
            line-height: 1.5;
        }

        .code-block-wrapper {
            position: relative;
            margin: 10px 0;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(102, 126, 234, 0.5);
            color: #e0e0e0;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1;
        }

        .code-block-wrapper:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        .msg.bot .msg-content blockquote {
            border-left: 3px solid #667eea;
            padding-left: 15px;
            margin: 10px 0;
            color: #aaa;
            font-style: italic;
        }

        .msg.bot .msg-content a {
            color: #667eea;
            text-decoration: underline;
        }

        .msg.bot .msg-content table {
            border-collapse: collapse;
            margin: 10px 0;
            width: 100%;
            font-size: 0.9em;
        }

        .msg.bot .msg-content th,
        .msg.bot .msg-content td {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            text-align: left;
        }

        .msg.bot .msg-content th {
            background: rgba(102, 126, 234, 0.2);
            font-weight: 600;
        }

        .msg.bot .msg-content strong {
            color: #fff;
        }

        .msg.bot .msg-content hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 15px 0;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        #promptInput {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px 18px;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            resize: none;
            min-height: 45px;
            max-height: 150px;
            font-family: inherit;
        }

        #promptInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
        }

        #promptInput::placeholder {
            color: #666;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            white-space: nowrap;
            align-self: flex-end;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .history-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #e0e0e0;
            padding: 8px 16px;
            font-size: 0.9rem;
            border-radius: 10px;
        }

        .history-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: none;
            box-shadow: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-box {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 25px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .history-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .history-q {
            color: #667eea;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .history-a {
            color: #ccc;
            font-size: 0.9rem;
        }

        .empty-chat {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            margin: auto;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .error-msg {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            align-self: flex-start;
        }

        .typing span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .hljs {
            background: transparent !important;
            padding: 0 !important;
        }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .msg-content { max-width: 85%; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Mafaka AI</h1>
            <p class="subtitle">AI Assistant на базе Gemini</p>
        </header>

        <div id="statusBar" class="status-bar">
            <span class="status-dot"></span>
            <span id="statusText">Подключено</span>
        </div>

        <div class="top-bar">
            <span style="color: #888;">💬 Диалог</span>
            <button class="history-btn" id="historyBtn">📋 История</button>
        </div>

        <div class="chat-box">
            <div class="messages-area" id="messagesArea">
                <div class="empty-chat">
                    <div class="empty-icon">🚀</div>
                    <h3>Начните диалог</h3>
                    <p style="margin-top: 10px;">Задайте вопрос и получите ответ</p>
                </div>
            </div>

            <div class="input-area">
                <textarea 
                    id="promptInput" 
                    placeholder="Введите сообщение... (Enter для отправки, Shift+Enter для новой строки)"
                    rows="1"
                    autocomplete="off"
                ></textarea>
                <button class="btn" id="sendBtn">Отправить</button>
            </div>
        </div>
    </div>

    <div class="modal" id="historyModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>📋 История</h2>
                <button class="modal-close" id="modalCloseBtn">✕</button>
            </div>
            <div id="historyContent">Загрузка...</div>
        </div>
    </div>

    <script>
        // СТРОГО: никаких глобальных функций, которые могут вызвать перезагрузку
        
        (function() {
            // ============ КОНФИГУРАЦИЯ ============
            const API_URL = 'http://localhost:8000';
            
            // ============ НАСТРОЙКА MARKDOWN ============
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, { language: lang }).value;
                        } catch (e) {}
                    }
                    return hljs.highlightAuto(code).value;
                },
                breaks: true,
                gfm: true
            });
            
            // ============ СОСТОЯНИЕ ============
            let isLoading = false;
            
            // ============ DOM ЭЛЕМЕНТЫ ============
            const messagesArea = document.getElementById('messagesArea');
            const promptInput = document.getElementById('promptInput');
            const sendBtn = document.getElementById('sendBtn');
            const historyBtn = document.getElementById('historyBtn');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            const historyModal = document.getElementById('historyModal');
            const historyContent = document.getElementById('historyContent');
            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');
            
            // ============ ФУНКЦИИ ============
            
            function formatResponse(text) {
                if (!text) return '';
                
                const hasMarkdown = /[#*`\-\[\]>|]/.test(text) || 
                                   text.includes('\n') || 
                                   text.includes('```');
                
                if (hasMarkdown) {
                    let html = marked.parse(text);
                    html = addCopyButtons(html);
                    return html;
                } else {
                    return escapeHtml(text).replace(/\n/g, '<br>');
                }
            }
            
            function addCopyButtons(html) {
                return html.replace(/<pre><code/g, '<div class="code-block-wrapper"><button class="copy-btn">📋 Копировать</button><pre><code')
                          .replace(/<\/code><\/pre>/g, '</code></pre></div>');
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            async function checkConnection() {
                try {
                    const response = await fetch(`${API_URL}/test`, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' }
                    });
                    
                    if (response.ok) {
                        statusBar.className = 'status-bar';
                        statusText.textContent = 'Подключено к серверу';
                        return true;
                    }
                } catch (e) {
                    statusBar.className = 'status-bar offline';
                    statusText.textContent = 'Сервер недоступен';
                    return false;
                }
            }
            
            async function sendMessage() {
                if (isLoading) return;
                
                const text = promptInput.value.trim();
                if (!text) return;
                
                const emptyEl = messagesArea.querySelector('.empty-chat');
                if (emptyEl) emptyEl.remove();
                
                messagesArea.querySelectorAll('.error-msg').forEach(el => el.remove());
                
                addMessage(text, 'user');
                
                promptInput.value = '';
                promptInput.style.height = 'auto';
                
                setLoading(true);
                
                try {
                    const response = await fetch(`${API_URL}/requests`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ prompt: text })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`Ошибка ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    removeTyping();
                    
                    if (data && data.answer) {
                        addFormattedMessage(data.answer, 'bot');
                    }
                    
                } catch (error) {
                    console.error('Ошибка:', error);
                    removeTyping();
                    
                    let msg = 'Ошибка отправки. ';
                    if (error.message.includes('Failed to fetch')) {
                        msg = 'Сервер недоступен. Запустите FastAPI на порту 8000.';
                    } else {
                        msg += error.message;
                    }
                    
                    showError(msg);
                } finally {
                    setLoading(false);
                    promptInput.focus();
                }
            }
            
            function addMessage(text, type) {
                const div = document.createElement('div');
                div.className = `msg ${type}`;
                
                const content = document.createElement('div');
                content.className = 'msg-content';
                content.textContent = text;
                
                div.appendChild(content);
                messagesArea.appendChild(div);
                
                scrollToBottom();
            }
            
            function addFormattedMessage(text, type) {
                const div = document.createElement('div');
                div.className = `msg ${type}`;
                
                const content = document.createElement('div');
                content.className = 'msg-content';
                content.innerHTML = formatResponse(text);
                
                div.appendChild(content);
                messagesArea.appendChild(div);
                
                // Подсветка кода
                content.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
                
                // Обработчики для кнопок копирования
                content.querySelectorAll('.copy-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        
                        const codeBlock = this.nextElementSibling.querySelector('code');
                        if (codeBlock) {
                            navigator.clipboard.writeText(codeBlock.textContent).then(() => {
                                this.textContent = '✅ Скопировано!';
                                setTimeout(() => {
                                    this.textContent = '📋 Копировать';
                                }, 2000);
                            });
                        }
                    });
                });
                
                scrollToBottom();
            }
            
            function showTyping() {
                const div = document.createElement('div');
                div.className = 'typing';
                div.id = 'typingIndicator';
                div.innerHTML = '<span></span><span></span><span></span>';
                messagesArea.appendChild(div);
                scrollToBottom();
            }
            
            function removeTyping() {
                const el = document.getElementById('typingIndicator');
                if (el) el.remove();
            }
            
            function showError(text) {
                const div = document.createElement('div');
                div.className = 'error-msg';
                div.textContent = text;
                messagesArea.appendChild(div);
                scrollToBottom();
            }
            
            function setLoading(loading) {
                isLoading = loading;
                sendBtn.disabled = loading;
                promptInput.disabled = loading;
                
                if (loading) {
                    sendBtn.textContent = '⏳';
                    showTyping();
                } else {
                    sendBtn.textContent = 'Отправить';
                }
            }
            
            function scrollToBottom() {
                setTimeout(() => {
                    messagesArea.scrollTop = messagesArea.scrollHeight;
                }, 50);
            }
            
            async function showHistory() {
                historyModal.classList.add('show');
                historyContent.innerHTML = '<p style="text-align:center;padding:20px;">Загрузка...</p>';
                
                try {
                    const response = await fetch(`${API_URL}/requests`, {
                        headers: { 'Accept': 'application/json' }
                    });
                    
                    if (!response.ok) throw new Error('Ошибка загрузки');
                    
                    const data = await response.json();
                    
                    if (!data || data.length === 0) {
                        historyContent.innerHTML = '<p style="text-align:center;color:#666;padding:40px;">История пуста</p>';
                    } else {
                        historyContent.innerHTML = data.map(item => `
                            <div class="history-card">
                                <div class="history-q">💭 ${escapeHtml(item.prompt)}</div>
                                <div class="history-a">🤖 ${formatResponse(item.response)}</div>
                            </div>
                        `).join('');
                    }
                } catch (error) {
                    historyContent.innerHTML = `<p style="text-align:center;color:#f44;padding:20px;">Ошибка: ${error.message}</p>`;
                }
            }
            
            function hideHistory() {
                historyModal.classList.remove('show');
            }
            
            // ============ ОБРАБОТЧИКИ СОБЫТИЙ ============
            
            // Кнопка отправки
            sendBtn.addEventListener('click', function(e) {
                e.preventDefault();
                sendMessage();
            });
            
            // Отправка по Enter
            promptInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // Авто-ресайз textarea
            promptInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            });
            
            // Кнопка истории
            historyBtn.addEventListener('click', function(e) {
                e.preventDefault();
                showHistory();
            });
            
            // Кнопка закрытия модального окна
            modalCloseBtn.addEventListener('click', function(e) {
                e.preventDefault();
                hideHistory();
            });
            
            // Закрытие по клику на фон
            historyModal.addEventListener('click', function(e) {
                if (e.target === historyModal) {
                    hideHistory();
                }
            });
            
            // Закрытие по Escape
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    hideHistory();
                }
            });
            
            // Предотвращаем ВСЕ перезагрузки
            window.addEventListener('beforeunload', function(e) {
                // Ничего не делаем, просто перехватываем
            });
            
            // Предотвращаем отправку форм (если есть)
            document.addEventListener('submit', function(e) {
                e.preventDefault();
                return false;
            });
            
            // ============ ИНИЦИАЛИЗАЦИЯ ============
            console.log('🚀 Mafaka Frontend v6 (No Reload)');
            console.log('📍 API:', API_URL);
            
            checkConnection();
            setInterval(checkConnection, 30000);
            promptInput.focus();
            
        })();
    </script>
</body>
</html>
